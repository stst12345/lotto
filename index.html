<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 자동 생성기 최신 버전 프로그램</title>
    <link rel="stylesheet" href="style.css">
    <!-- 구글 폰트(Pretendard 느낌을 위해 웹 폰트 사용) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3132562341790872" crossorigin="anonymous"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">로또 번호 생성기</div>
            <nav class="nav-menu">
                <a href="https://krfinanceman.com/%eb%a1%9c%eb%98%90-%eb%8b%b9%ec%b2%a8-%eb%b2%88%ed%98%b8-%ea%b0%80%ec%9e%a5-%eb%a7%8e%ec%9d%b4-%eb%82%98%ec%98%a8-%ec%88%ab%ec%9e%90%eb%8a%94/" target="_blank">역대 가장 많이 나온 번호</a>
                <a href="https://www.dhlottery.co.kr/wnprchsplcsrch/home" target="_blank">당첨 판매점</a>
                <a href="https://krfinanceman.com/%eb%aa%a8%eb%b0%94%ec%9d%bc-%eb%a1%9c%eb%98%90-%ea%b5%ac%eb%a7%a4-%eb%b0%a9%eb%b2%95-%eb%8f%99%ed%96%89%eb%b3%b5%ea%b6%8c/" target="_blank">로또 구매하기</a>
            </nav>
        </div>
    </header>

    <main class="main-container">
        <!-- 상단 광고 -->
        <div class="ad-container">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-3132562341790872"
                 data-ad-slot="8634910433"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

        <div class="card">
            <h1 class="card-title">로또 번호 생성기</h1>
            <p class="card-subtitle">행운의 번호를 생성해보세요!</p>

            <div class="numbers-display" id="main-numbers">
                <div class="ball ball-empty">?</div>
                <div class="ball ball-empty">?</div>
                <div class="ball ball-empty">?</div>
                <div class="ball ball-empty">?</div>
                <div class="ball ball-empty">?</div>
                <div class="ball ball-empty">?</div>
            </div>

            <button class="generate-btn" id="generate-btn">번호 생성하기</button>

            <!-- 중간 광고 -->
            <div class="ad-container-small">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-3132562341790872"
                     data-ad-slot="8634910433"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>

            <div class="history-section">
                <div class="history-header">
                    <h2 class="history-title">생성 기록</h2>
                    <button class="delete-history-btn" id="delete-history-btn">기록 삭제</button>
                </div>
                <div class="history-list" id="history-list">
                    <!-- 기록이 여기에 추가됩니다 -->
                </div>
            </div>
        </div>

        <!-- 하단 광고 -->
        <div class="ad-container">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-3132562341790872"
                 data-ad-slot="8634910433"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
